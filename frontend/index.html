<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameList — Entrar</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div>
    <h1>GameList</h1>
  </div>

 
  <form id="form-login" onsubmit="fazerLogin(event)">
    <h2>Login</h2>
    
    <div>
      <label for="login-email">Usuário / E-mail:</label>
      <input type="text" id="login-email" required />
      <span id="err-login-email"></span>
    </div>

    <div>
      <label for="login-password">Senha:</label>
      <input type="password" id="login-password" required minlength="4" />
      <span id="err-login-password"></span>
    </div>

    <div id="msg-login"></div>
    <button type="submit" id="btn-login">Entrar</button>
  </form>

  <form id="form-register" class="hidden" onsubmit="fazerCadastro(event)">
    <h2>Cadastro</h2>
    
    <div>
      <label for="reg-name">Usuário:</label>
      <input type="text" id="reg-name" required />
      <span id="err-reg-name"></span>
    </div>

    <div>
      <label for="reg-email">E-mail:</label>
      <input type="email" id="reg-email" required />
      <span id="err-reg-email"></span>
    </div>

    <div>
      <label for="reg-password">Senha:</label>
      <input type="password" id="reg-password" required minlength="4" />
      <span id="err-reg-password"></span>
    </div>

    <div>
      <label for="reg-confirm">Confirmar senha:</label>
      <input type="password" id="reg-confirm" required minlength="4" />
      <span id="err-reg-confirm"></span>
    </div>

    <div id="msg-register"></div>
    <button type="submit" id="btn-register">Criar conta</button>
  </form>

  <script src="js/auth.js"></script>
</body>
</html>
